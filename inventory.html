<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - Big Joe's</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
<div class="topbar">📍 Admin Panel — Big Joe's Fast Food</div>
<nav class="navbar">
  <a href="index.html" class="logo">🍔 BIG JOE'S</a>
  <div class="nav-links"></div>
</nav>

<section class="container">
  <h1 class="section-title">Inventory</h1>

  <div class="admin-tabs" id="role-tabs"></div>

  <div class="form-box" style="max-width:100%;margin-bottom:24px">
    <h3 style="margin-bottom:16px" id="form-title">➕ Add Stock Item</h3>
    <div id="inv-error" class="alert alert-error" style="display:none"></div>
    <div class="form-row">
      <div><label>Item Name</label><input id="inv-name" placeholder="e.g. Burger Buns"></div>
      <div><label>Unit</label><input id="inv-unit" placeholder="e.g. units, kg, litres"></div>
    </div>
    <div class="form-row">
      <div><label>Quantity</label><input id="inv-qty" type="number" min="0" placeholder="0"></div>
      <div><label>Low Stock Alert At</label><input id="inv-threshold" type="number" min="0" placeholder="10"></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-green" onclick="saveItem()">Save Item</button>
      <button class="btn btn-outline" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <div class="table-box">
    <h2 style="margin-bottom:16px">Stock Levels</h2>
    <div id="inv-table">
      <div class="loading-state"><div class="spin-lg"></div>Loading inventory...</div>
    </div>
  </div>
</section>

<footer class="footer">
  <div><h3>BIG JOE'S</h3><a href="menu.html">Menu</a></div>
  <div><h3>Admin</h3><a href="dashboard.html">Dashboard</a></div>
  <div><h3>Find Us</h3><p>Durban, South Africa</p></div>
</footer>
<div class="footer-bottom">Copyright &copy; Big Joe's Fast Food. All Rights Reserved.</div>

<script>
var editingId = null

function clearForm() {
  editingId = null
  document.getElementById('form-title').textContent = '➕ Add Stock Item'
  document.getElementById('inv-name').value = ''
  document.getElementById('inv-unit').value = ''
  document.getElementById('inv-qty').value = ''
  document.getElementById('inv-threshold').value = ''
  document.getElementById('inv-error').style.display = 'none'
}

function editItem(id, name, unit, qty, threshold) {
  editingId = id
  document.getElementById('form-title').textContent = '✏️ Edit Item'
  document.getElementById('inv-name').value = name
  document.getElementById('inv-unit').value = unit
  document.getElementById('inv-qty').value = qty
  document.getElementById('inv-threshold').value = threshold
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

async function adjustQty(id, current, delta) {
  var newQty = Math.max(0, current + delta)
  await _db.from('inventory').update({ quantity: newQty, updated_at: new Date().toISOString() }).eq('id', id)
  loadInventory()
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return
  await _db.from('inventory').delete().eq('id', id)
  BJ.showToast('Item deleted')
  loadInventory()
}

async function saveItem() {
  var name      = document.getElementById('inv-name').value.trim()
  var unit      = document.getElementById('inv-unit').value.trim() || 'units'
  var qty       = parseInt(document.getElementById('inv-qty').value) || 0
  var threshold = parseInt(document.getElementById('inv-threshold').value) || 10
  var errEl     = document.getElementById('inv-error')
  errEl.style.display = 'none'

  if (!name) { errEl.textContent = 'Item name is required.'; errEl.style.display = 'block'; return }

  if (editingId) {
    await _db.from('inventory').update({ item_name: name, unit: unit, quantity: qty, low_stock_threshold: threshold, updated_at: new Date().toISOString() }).eq('id', editingId)
    BJ.showToast('Item updated!')
  } else {
    var { error } = await _db.from('inventory').insert({ item_name: name, unit: unit, quantity: qty, low_stock_threshold: threshold })
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return }
    BJ.showToast('Item added!')
  }
  clearForm()
  loadInventory()
}

async function loadInventory() {
  var { data } = await _db.from('inventory').select('*').order('item_name')
  var container = document.getElementById('inv-table')
  if (!data || !data.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><h3>No inventory items yet</h3></div>'
    return
  }
  container.innerHTML = '<table><thead><tr><th>Item</th><th>Quantity</th><th>Unit</th><th>Status</th><th>Alert At</th><th>Actions</th></tr></thead><tbody>' +
    data.map(function(item) {
      var isLow = item.quantity <= item.low_stock_threshold
      return '<tr>' +
        '<td><strong>' + item.item_name + '</strong></td>' +
        '<td><div style="display:flex;align-items:center;gap:8px">' +
          '<button class="tbl-btn warn" onclick="adjustQty(\'' + item.id + '\',' + item.quantity + ',-1)">−</button>' +
          '<strong style="min-width:32px;text-align:center">' + item.quantity + '</strong>' +
          '<button class="tbl-btn success" onclick="adjustQty(\'' + item.id + '\',' + item.quantity + ',1)">+</button>' +
        '</div></td>' +
        '<td>' + item.unit + '</td>' +
        '<td><span class="' + (isLow ? 'low' : 'ok') + '">' + (isLow ? '⚠ Low Stock' : '✔ OK') + '</span></td>' +
        '<td>' + item.low_stock_threshold + '</td>' +
        '<td>' +
          '<button class="tbl-btn edit" onclick="editItem(\'' + item.id + '\',\'' + item.item_name.replace(/'/g,"\\'") + '\',\'' + item.unit + '\',' + item.quantity + ',' + item.low_stock_threshold + ')">Edit</button> ' +
          '<button class="tbl-btn danger" onclick="deleteItem(\'' + item.id + '\')">Delete</button>' +
        '</td>' +
        '</tr>'
    }).join('') +
    '</tbody></table>'
}

;(async function() {
  BJ.initNav()
  var profile = await BJ.requireAdmin()
    if (!profile) return

    document.getElementById('role-tabs').innerHTML =
        BJ.getRoleTabs(profile.role, 'inventory')
  loadInventory()
})()
</script>
</body>
</html>
