<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Big Joe's</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
<div class="topbar">📍 Admin Panel — Big Joe's Fast Food</div>
<nav class="navbar">
  <a href="index.html" class="logo">🍔 BIG JOE'S</a>
  <div class="nav-links"></div>
</nav>

<section class="container">
  <h1 class="section-title">Customers</h1>

  <div class="admin-tabs" id="role-tabs"></div>

  <div class="table-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <h2>All Users</h2>
      <input id="search" placeholder="🔍 Search by name or phone..." oninput="filterCustomers()"
             style="width:280px;padding:9px 14px;border-radius:20px;border:1px solid #ddd">
    </div>
    <div id="customers-table">
      <div class="loading-state"><div class="spin-lg"></div>Loading customers...</div>
    </div>
  </div>
</section>

<footer class="footer">
  <div><h3>BIG JOE'S</h3><a href="menu.html">Menu</a></div>
  <div><h3>Admin</h3><a href="dashboard.html">Dashboard</a></div>
  <div><h3>Find Us</h3><p>Durban, South Africa</p></div>
</footer>
<div class="footer-bottom">Copyright &copy; Big Joe's Fast Food. All Rights Reserved.</div>

<script>
var allCustomers = []

function renderTable(list) {
  var container = document.getElementById('customers-table')
  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">👥</div><h3>No customers found</h3></div>'
    return
  }
  container.innerHTML = '<table><thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Role</th><th>Joined</th><th>Change Role</th></tr></thead><tbody>' +
    list.map(function(c, i) {
      var roleColor = c.role === 'admin' ? '#c8102e' : c.role === 'staff' ? '#2196f3' : '#28a745'
      var opts = ['customer','staff','admin'].map(function(r) {
        return '<option value="' + r + '"' + (c.role === r ? ' selected' : '') + '>' + r.charAt(0).toUpperCase() + r.slice(1) + '</option>'
      }).join('')
      return '<tr>' +
        '<td class="text-muted">' + (i + 1) + '</td>' +
        '<td><strong>' + (c.full_name || '—') + '</strong></td>' +
        '<td>' + (c.phone || '—') + '</td>' +
        '<td><span class="badge" style="background:' + roleColor + '">' + (c.role || 'customer') + '</span></td>' +
        '<td class="text-muted">' + new Date(c.created_at).toLocaleDateString('en-ZA') + '</td>' +
        '<td><select onchange="setRole(\'' + c.id + '\', this.value)" style="padding:5px 8px;font-size:12px;border-radius:4px;border:1px solid #ddd">' + opts + '</select></td>' +
        '</tr>'
    }).join('') +
    '</tbody></table>'
}

function filterCustomers() {
  var q = document.getElementById('search').value.toLowerCase()
  renderTable(allCustomers.filter(function(c) {
    return (c.full_name || '').toLowerCase().includes(q) || (c.phone || '').includes(q)
  }))
}

async function setRole(id, role) {
  var { error } = await _db.from('profiles').update({ role: role }).eq('id', id)
  if (error) { BJ.showToast('Failed to update role', 'error'); return }
  BJ.showToast('Role updated to ' + role + '!')
  var idx = allCustomers.findIndex(function(c) { return c.id === id })
  if (idx > -1) allCustomers[idx].role = role
  renderTable(allCustomers)
}

;(async function() {
  BJ.initNav()
  var profile = await BJ.requireAdmin()
    if (!profile) return

    document.getElementById('role-tabs').innerHTML =
        BJ.getRoleTabs(profile.role, 'customers')

  var { data } = await _db.from('profiles').select('id, full_name, phone, role, created_at').order('created_at', { ascending: false })
  allCustomers = data || []
  renderTable(allCustomers)
})()
</script>
</body>
</html>
