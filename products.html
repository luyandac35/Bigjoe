<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Big Joe's</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
<div class="topbar">📍 Admin Panel — Big Joe's Fast Food</div>
<nav class="navbar">
  <a href="index.html" class="logo">🍔 BIG JOE'S</a>
  <div class="nav-links"></div>
</nav>

<section class="container">
  <h1 class="section-title">Products</h1>

  <div class="admin-tabs" id="role-tabs"></div>

  <div class="form-box" style="max-width:100%;margin-bottom:24px">
    <h3 style="margin-bottom:16px" id="form-title">➕ Add New Product</h3>
    <div id="prod-error" class="alert alert-error" style="display:none"></div>
    <div class="form-row">
      <div><label>Product Name</label><input id="prod-name" placeholder="e.g. Big Joe Burger"></div>
      <div>
        <label>Category</label>
        <select id="prod-cat">
          <option value="burger">Burger</option>
          <option value="chicken">Chicken</option>
          <option value="combo">Combo</option>
          <option value="sides">Sides</option>
          <option value="drinks">Drinks</option>
          <option value="dessert">Dessert</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><label>Price (R)</label><input id="prod-price" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div><label>Image URL (optional)</label><input id="prod-image" placeholder="https://..."></div>
    </div>
    <label>Description</label>
    <textarea id="prod-desc" placeholder="Short description" rows="2"></textarea>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-green" onclick="saveProduct()">Save Product</button>
      <button class="btn btn-outline" onclick="clearProductForm()">Clear</button>
    </div>
  </div>

  <div class="table-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <h2>All Products</h2>
      <input id="prod-search" placeholder="🔍 Search products..." oninput="filterProducts()"
             style="width:240px;padding:9px 14px;border-radius:20px;border:1px solid #ddd">
    </div>
    <div id="prod-table">
      <div class="loading-state"><div class="spin-lg"></div>Loading products...</div>
    </div>
  </div>
</section>

<footer class="footer">
  <div><h3>BIG JOE'S</h3><a href="menu.html">Menu</a></div>
  <div><h3>Admin</h3><a href="dashboard.html">Dashboard</a></div>
  <div><h3>Find Us</h3><p>Durban, South Africa</p></div>
</footer>
<div class="footer-bottom">Copyright &copy; Big Joe's Fast Food. All Rights Reserved.</div>

<script>
var allProducts = []
var editingId   = null

function clearProductForm() {
  editingId = null
  document.getElementById('form-title').textContent = '➕ Add New Product'
  document.getElementById('prod-name').value  = ''
  document.getElementById('prod-cat').value   = 'burger'
  document.getElementById('prod-price').value = ''
  document.getElementById('prod-image').value = ''
  document.getElementById('prod-desc').value  = ''
  document.getElementById('prod-error').style.display = 'none'
}

function filterProducts() {
  var q = document.getElementById('prod-search').value.toLowerCase()
  renderTable(allProducts.filter(function(p) {
    return p.name.toLowerCase().includes(q) || p.category.includes(q)
  }))
}

function renderTable(list) {
  var container = document.getElementById('prod-table')
  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🍔</div><h3>No products found</h3></div>'
    return
  }
  container.innerHTML = '<table><thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead><tbody>' +
    list.map(function(p) {
      var img = p.image_url || 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=80&q=60'
      return '<tr>' +
        '<td><img src="' + img + '" style="width:56px;height:44px;object-fit:cover;border-radius:6px" alt="' + p.name + '"></td>' +
        '<td><strong>' + p.name + '</strong><br><span class="text-muted">' + (p.description || '') + '</span></td>' +
        '<td>' + p.category + '</td>' +
        '<td><strong>R' + Number(p.price).toFixed(2) + '</strong></td>' +
        '<td><span class="' + (p.available ? 'ok' : 'low') + '">' + (p.available ? '✔ Active' : '✕ Hidden') + '</span></td>' +
        '<td style="white-space:nowrap">' +
          '<button class="tbl-btn edit" onclick="editProduct(\'' + p.id + '\')">Edit</button> ' +
          '<button class="tbl-btn ' + (p.available ? 'warn' : 'success') + '" onclick="toggleAvailable(\'' + p.id + '\',' + p.available + ')">' + (p.available ? 'Hide' : 'Show') + '</button> ' +
          '<button class="tbl-btn danger" onclick="deleteProduct(\'' + p.id + '\')">Delete</button>' +
        '</td>' +
        '</tr>'
    }).join('') +
    '</tbody></table>'
}

function editProduct(id) {
  var p = allProducts.find(function(x) { return x.id === id })
  if (!p) return
  editingId = id
  document.getElementById('form-title').textContent = '✏️ Edit Product'
  document.getElementById('prod-name').value  = p.name
  document.getElementById('prod-cat').value   = p.category
  document.getElementById('prod-price').value = p.price
  document.getElementById('prod-image').value = p.image_url || ''
  document.getElementById('prod-desc').value  = p.description || ''
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

async function toggleAvailable(id, current) {
  await _db.from('menu_items').update({ available: !current }).eq('id', id)
  BJ.showToast('Product ' + (!current ? 'shown on menu' : 'hidden from menu'))
  loadProducts()
}

async function deleteProduct(id) {
  if (!confirm('Delete this product? This cannot be undone.')) return
  await _db.from('menu_items').delete().eq('id', id)
  BJ.showToast('Product deleted')
  loadProducts()
}

async function saveProduct() {
  var name        = document.getElementById('prod-name').value.trim()
  var category    = document.getElementById('prod-cat').value
  var price       = parseFloat(document.getElementById('prod-price').value)
  var image_url   = document.getElementById('prod-image').value.trim() || null
  var description = document.getElementById('prod-desc').value.trim() || null
  var errEl       = document.getElementById('prod-error')
  errEl.style.display = 'none'

  if (!name || isNaN(price) || price < 0) {
    errEl.textContent = 'Please enter a valid name and price.'
    errEl.style.display = 'block'; return
  }

  if (editingId) {
    var { error } = await _db.from('menu_items').update({ name: name, category: category, price: price, image_url: image_url, description: description }).eq('id', editingId)
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return }
    BJ.showToast('Product updated!')
  } else {
    var { error } = await _db.from('menu_items').insert({ name: name, category: category, price: price, image_url: image_url, description: description, available: true })
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return }
    BJ.showToast('Product added!')
  }
  clearProductForm()
  loadProducts()
}

async function loadProducts() {
  var { data } = await _db.from('menu_items').select('*').order('category').order('name')
  allProducts = data || []
  renderTable(allProducts)
}

;(async function() {
  BJ.initNav()
  var profile = await BJ.requireAdmin()
    if (!profile) return

    document.getElementById('role-tabs').innerHTML =
        BJ.getRoleTabs(profile.role, 'products')

  loadProducts()
})()
</script>
</body>
</html>
