<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IoT Stock Monitoring - Big Joe's</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>

<div class="topbar">📡 IoT Stock Monitoring Simulation — Big Joe's</div>

<nav class="navbar">
  <a href="index.html" class="logo">🍔 BIG JOE'S</a>
  <div class="nav-links"></div>
</nav>

<section class="container">
  <h1 class="section-title">IoT Stock Monitoring</h1>

  <<div class="admin-tabs" id="role-tabs"></div>

  <div class="table-box">
    <h2>Simulated IoT Sensor Alerts</h2>
    <p class="text-muted">
      This page simulates IoT stock sensors that monitor inventory levels and alert management when stock is low.
    </p>

    <div id="iot-alerts">
      <div class="loading-state">Loading sensor data...</div>
    </div>
  </div>
</section>

<script>
;(async function() {
  BJ.initNav()

  var profile = await BJ.requireAdmin()
    if (!profile) return

    document.getElementById('role-tabs').innerHTML =
        BJ.getRoleTabs(profile.role, 'iot')

  var { data, error } = await _db
    .from('inventory')
    .select('*')
    .order('item_name')

  var box = document.getElementById('iot-alerts')

  if (error) {
    box.innerHTML = '<div class="alert alert-error">' + error.message + '</div>'
    return
  }

  var lowItems = (data || []).filter(function(item) {
    return Number(item.quantity) <= Number(item.low_stock_threshold)
  })

  if (!lowItems.length) {
    box.innerHTML =
      '<div class="alert alert-success">✅ All stock levels are healthy. No IoT alerts right now.</div>'
    return
  }

  box.innerHTML = lowItems.map(function(item) {
    return '<div class="alert alert-error" style="margin-top:12px">' +
      '<h3>⚠ Low Stock Sensor Alert</h3>' +
      '<p><strong>Item:</strong> ' + item.item_name + '</p>' +
      '<p><strong>Current Quantity:</strong> ' + item.quantity + ' ' + item.unit + '</p>' +
      '<p><strong>Alert Threshold:</strong> ' + item.low_stock_threshold + '</p>' +
      '<p>Action: Restock this item before it affects customer orders.</p>' +
    '</div>'
  }).join('')
})()
</script>

</body>
</html>
